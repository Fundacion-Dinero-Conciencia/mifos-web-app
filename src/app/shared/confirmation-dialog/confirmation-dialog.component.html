<div class="confirm-dialog">
  <div class="dialog-icon">
    <mat-icon>info_outline</mat-icon>
  </div>

  <h2>{{ data.heading }}</h2>

  <p class="dialog-message">
    {{ data.dialogContext }}
  </p>

  <div class="dialog-actions">
    <button mat-stroked-button mat-dialog-close class="btn-secondary">
      {{ 'labels.buttons.Back' | translate }}
    </button>

    <button mat-flat-button color="primary" [mat-dialog-close]="{ confirm: true }" class="btn-primary">
      {{ 'labels.buttons.Confirm' | translate }}
    </button>
  </div>
</div>
